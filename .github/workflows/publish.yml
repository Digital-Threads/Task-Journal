name: Publish to crates.io

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo login
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo login "$CARGO_REGISTRY_TOKEN"

      - name: Publish task-journal-core
        run: cargo publish -p task-journal-core --no-verify
        continue-on-error: true

      - name: Wait for crates.io to index
        run: sleep 30

      - name: Publish task-journal-cli
        run: cargo publish -p task-journal-cli --no-verify
        continue-on-error: true

      - name: Publish task-journal-mcp
        run: cargo publish -p task-journal-mcp --no-verify
        continue-on-error: true
